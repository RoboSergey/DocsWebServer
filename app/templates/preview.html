<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ document.title }}</title>
    <style>
        :root {
            --main-bg: #ffffff;
            --toolbar-bg: #f8f8f8;
            --border: #ddd;
            --text: #1a1a1a;
            --muted: #888;
            --font-ui: system-ui, -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --main-bg: #2d2d2d;
                --toolbar-bg: #252525;
                --border: #3a3a3a;
                --text: #dcddde;
                --muted: #888;
            }
        }
        body { margin: 0; padding: 0; font-family: var(--font-ui); background: var(--main-bg); color: var(--text); }
        .preview-header {
            padding: 1rem;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .preview-frame {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="preview-header">
        <strong>{{ document.title }}</strong>
        <span style="color: var(--muted); font-size: 0.875rem;">Shared document</span>
    </div>
    <iframe
        class="preview-frame"
        src="/preview/{{ document.id }}/raw{% if request.query_params.get('token') %}?token={{ request.query_params.get('token') }}{% endif %}"
        sandbox="allow-scripts"
    ></iframe>
</body>
</html>
