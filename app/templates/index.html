{% extends "base.html" %}

{% block title %}DocsWebServer{% endblock %}

{% block body %}
<div id="app">
  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <button type="button" class="btn primary" id="btn-new-doc" title="New document">+ Doc</button>
      <button type="button" class="btn" id="btn-new-folder" title="New folder">+ 📁</button>
    </div>
    <div id="sidebar-tree">
      <div id="tree-root"></div>
    </div>
  </aside>

  <!-- ── Main area ── -->
  <div id="main">
    <div id="toolbar">
      <span id="toolbar-title">Select a document</span>
      <div id="toolbar-actions" style="display:none; gap:6px;">
        <button type="button" class="btn" id="btn-toggle-edit">✏️ Edit</button>
        <button type="button" class="btn" id="btn-save" style="display:none;">💾 Save</button>
        <button type="button" class="btn" id="btn-upload">⬆️ Upload</button>
        <button type="button" class="btn" id="btn-history">🕐 History</button>
        <button type="button" class="btn" id="btn-share">🔗 Share</button>
        <button type="button" class="btn" id="btn-delete" style="color:#c0392b;">🗑</button>
      </div>
      <input type="file" id="file-input" accept=".html,text/html" style="display:none;">
    </div>

    <!-- Inline panels -->
    <div id="panel" role="region" aria-label="Panel">
      <div id="panel-history" style="display:none;"></div>
      <div id="panel-share" style="display:none;"></div>
    </div>

    <!-- Content area -->
    <div id="content">
      <div id="empty-state">
        <span>📄</span>
        <span>Select or create a document</span>
      </div>
      <iframe id="preview-iframe" sandbox="allow-scripts" style="display:none;" title="Preview"></iframe>
      <div id="editor-wrap"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/static/js/app.js"></script>
{% endblock %}
