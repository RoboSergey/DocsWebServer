<div id="document-list">
{% if documents %}
<div class="document-grid">
{% for doc in documents %}
<article class="document-card">
    <header>
        <a href="/edit/{{ doc.id }}"><strong>{{ doc.title }}</strong></a>
    </header>
    <footer>
        <small>
            {{ doc.version_count }} version{{ 's' if doc.version_count != 1 else '' }}
            &middot;
            Updated {{ doc.updated_at.strftime('%b %d, %Y') }}
        </small>
        <div>
            <a href="/edit/{{ doc.id }}" role="button" class="outline secondary" style="padding:0.25rem 0.75rem">Edit</a>
            <button class="outline contrast"
                    style="padding:0.25rem 0.75rem"
                    hx-delete="/api/documents/{{ doc.id }}"
                    hx-confirm="Delete '{{ doc.title }}'?"
                    hx-on::after-request="if(event.detail.successful){htmx.ajax('GET','/partials/documents',{target:'#document-list',swap:'outerHTML'});showToast('Document deleted')}">
                Delete
            </button>
        </div>
    </footer>
</article>
{% endfor %}
</div>
{% else %}
<p class="text-muted">No documents yet. Create your first document above.</p>
{% endif %}
</div>
